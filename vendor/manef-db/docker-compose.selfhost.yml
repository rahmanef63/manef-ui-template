services:
  convex-backend:
    image: ghcr.io/get-convex/convex-backend:latest
    stop_grace_period: 10s
    stop_signal: SIGINT
    volumes:
      - convex_data:/convex/data
    environment:
      ACTIONS_USER_TIMEOUT_SECS: ${ACTIONS_USER_TIMEOUT_SECS:-}
      APPLICATION_MAX_CONCURRENT_MUTATIONS: ${APPLICATION_MAX_CONCURRENT_MUTATIONS:-16}
      APPLICATION_MAX_CONCURRENT_NODE_ACTIONS: ${APPLICATION_MAX_CONCURRENT_NODE_ACTIONS:-16}
      APPLICATION_MAX_CONCURRENT_QUERIES: ${APPLICATION_MAX_CONCURRENT_QUERIES:-16}
      APPLICATION_MAX_CONCURRENT_V8_ACTIONS: ${APPLICATION_MAX_CONCURRENT_V8_ACTIONS:-16}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_REGION: ${AWS_REGION:-}
      AWS_S3_DISABLE_CHECKSUMS: ${AWS_S3_DISABLE_CHECKSUMS:-}
      AWS_S3_DISABLE_SSE: ${AWS_S3_DISABLE_SSE:-}
      AWS_S3_FORCE_PATH_STYLE: ${AWS_S3_FORCE_PATH_STYLE:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      CONVEX_CLOUD_ORIGIN: ${CONVEX_CLOUD_ORIGIN:-https://dbgg.<YOUR_DOMAIN>}
      CONVEX_RELEASE_VERSION_DEV: ${CONVEX_RELEASE_VERSION_DEV:-}
      CONVEX_SITE_ORIGIN: ${CONVEX_SITE_ORIGIN:-https://dbggsite.<YOUR_DOMAIN>}
      DATABASE_URL: ${DATABASE_URL:-}
      DISABLE_BEACON: ${DISABLE_BEACON:-}
      DISABLE_METRICS_ENDPOINT: ${DISABLE_METRICS_ENDPOINT:-true}
      DOCUMENT_RETENTION_DELAY: ${DOCUMENT_RETENTION_DELAY:-172800}
      DO_NOT_REQUIRE_SSL: ${DO_NOT_REQUIRE_SSL:-}
      HTTP_SERVER_TIMEOUT_SECONDS: ${HTTP_SERVER_TIMEOUT_SECONDS:-}
      INSTANCE_NAME: ${INSTANCE_NAME:-manef-db}
      INSTANCE_SECRET: ${INSTANCE_SECRET}
      MYSQL_URL: ${MYSQL_URL:-}
      POSTGRES_URL: ${POSTGRES_URL:-}
      REDACT_LOGS_TO_CLIENT: ${REDACT_LOGS_TO_CLIENT:-}
      RUST_BACKTRACE: ${RUST_BACKTRACE:-}
      RUST_LOG: ${RUST_LOG:-info}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      S3_STORAGE_EXPORTS_BUCKET: ${S3_STORAGE_EXPORTS_BUCKET:-}
      S3_STORAGE_FILES_BUCKET: ${S3_STORAGE_FILES_BUCKET:-}
      S3_STORAGE_MODULES_BUCKET: ${S3_STORAGE_MODULES_BUCKET:-}
      S3_STORAGE_SEARCH_BUCKET: ${S3_STORAGE_SEARCH_BUCKET:-}
      S3_STORAGE_SNAPSHOT_IMPORTS_BUCKET: ${S3_STORAGE_SNAPSHOT_IMPORTS_BUCKET:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3210/version"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - dokploy-network
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      labels:
        - traefik.enable=true
        - traefik.docker.network=dokploy-network
        - traefik.http.routers.convex-api.rule=Host(`${CONVEX_API_DOMAIN:-dbgg.<YOUR_DOMAIN>}`)
        - traefik.http.routers.convex-api.entrypoints=websecure
        - traefik.http.routers.convex-api.tls=true
        - traefik.http.routers.convex-api.tls.certresolver=letsencrypt
        - traefik.http.routers.convex-api.service=convex-api
        - traefik.http.services.convex-api.loadbalancer.server.port=3210
        - traefik.http.routers.convex-site.rule=Host(`${CONVEX_SITE_DOMAIN:-dbggsite.<YOUR_DOMAIN>}`)
        - traefik.http.routers.convex-site.entrypoints=websecure
        - traefik.http.routers.convex-site.tls=true
        - traefik.http.routers.convex-site.tls.certresolver=letsencrypt
        - traefik.http.routers.convex-site.service=convex-site
        - traefik.http.services.convex-site.loadbalancer.server.port=3211
    restart: unless-stopped

  convex-dashboard:
    image: ghcr.io/get-convex/convex-dashboard:latest
    stop_grace_period: 10s
    stop_signal: SIGINT
    environment:
      NEXT_PUBLIC_DEPLOYMENT_URL: ${NEXT_PUBLIC_DEPLOYMENT_URL:-https://dbgg.<YOUR_DOMAIN>}
      NEXT_PUBLIC_LOAD_MONACO_INTERNALLY: ${NEXT_PUBLIC_LOAD_MONACO_INTERNALLY:-}
    depends_on:
      convex-backend:
        condition: service_healthy
    networks:
      - dokploy-network
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      labels:
        - traefik.enable=true
        - traefik.docker.network=dokploy-network
        - traefik.http.routers.convex-dashboard.rule=Host(`${CONVEX_DASHBOARD_DOMAIN:-dbggdash.<YOUR_DOMAIN>}`)
        - traefik.http.routers.convex-dashboard.entrypoints=websecure
        - traefik.http.routers.convex-dashboard.tls=true
        - traefik.http.routers.convex-dashboard.tls.certresolver=letsencrypt
        - traefik.http.services.convex-dashboard.loadbalancer.server.port=6791
    restart: unless-stopped

volumes:
  convex_data:

networks:
  dokploy-network:
    external: true
